<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Благодарим ти - Studio 9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="legal.css">
<style>
  .thankyou-main{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    max-width:520px;
    margin:0 auto;
    padding:100px 24px 120px;
    min-height:60vh;
    justify-content:center;
  }
  .check-icon{
    margin-bottom:32px;
  }
  .check-circle{
    stroke-dasharray:1;
    stroke-dashoffset:1;
    animation:draw-circle .6s ease forwards;
  }
  .check-mark{
    stroke-dasharray:1;
    stroke-dashoffset:1;
    animation:draw-mark .35s ease forwards .55s;
  }
  @keyframes draw-circle{
    to{stroke-dashoffset:0;}
  }
  @keyframes draw-mark{
    to{stroke-dashoffset:0;}
  }
  .thankyou-main h1{
    font-size:clamp(28px, 4vw, 38px);
    font-weight:800;
    letter-spacing:-0.01em;
    margin-bottom:14px;
  }
  .thankyou-main p{
    color:#bbb;
    font-size:16px;
    line-height:1.6;
    max-width:400px;
  }
  .thankyou-back{
    display:inline-block;
    margin-top:36px;
    background:var(--orange);
    color:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
    padding:15px 30px;
    border-radius:8px;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .thankyou-back:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px -10px rgba(242,113,45,0.5);
  }
</style>
</head>
<body>

<nav class="legal-nav">
  <a href="index.html"><img src="assets/studio9-logo.png" alt="Studio 9" class="legal-logo"></a>
  <a href="index.html" class="legal-back">← Обратно към сайта</a>
</nav>

<main class="thankyou-main">
  <svg class="check-icon" width="110" height="110" viewBox="0 0 100 100">
    <circle class="check-circle" cx="50" cy="50" r="44" fill="none" stroke="#f2712d" stroke-width="4" pathLength="1"/>
    <path class="check-mark" d="M30 52 L44 66 L72 34" fill="none" stroke="#f2712d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/>
  </svg>
  <h1>Благодарим ти!</h1>
  <p>Получихме запитването ти и ще се свържем с теб възможно най-скоро.</p>
  <a href="index.html" class="thankyou-back">Обратно към сайта</a>
</main>

</body>
</html>
